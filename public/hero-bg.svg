<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DA251D"/>
      <stop offset="1" stop-color="#7F0D10"/>
    </linearGradient>
    <radialGradient id="r" cx="68%" cy="30%" r="55%">
      <stop offset="0" stop-color="#FFCD00" stop-opacity=".35"/>
      <stop offset=".55" stop-color="#FFCD00" stop-opacity=".10"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="p" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 64L64 0" stroke="#ffffff" stroke-opacity=".08" stroke-width="2"/>
      <path d="M-16 64L64 -16" stroke="#ffffff" stroke-opacity=".05" stroke-width="2"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#p)" opacity=".9"/>
  <circle cx="1180" cy="250" r="360" fill="url(#r)" filter="url(#blur)"/>
  <circle cx="280" cy="740" r="300" fill="#FFCD00" opacity=".10" filter="url(#blur)"/>
</svg>

